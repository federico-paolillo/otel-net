receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:40318

exporters:
  debug:
    verbosity: normal
  otlp_http:
    endpoint: http://lgtm:4318

service:
  telemetry:
    logs:
      level: DEBUG
    metrics:
      readers:
        - periodic:
            interval: 1000
            exporter:
              otlp:
                endpoint: http://lgtm:4318/v1/metrics
                protocol: http/protobuf
  
  pipelines:
    traces:
      receivers: [ otlp ]
      exporters: [ debug, otlp_http ]
    logs:
      receivers: [ otlp ]
      exporters: [ debug, otlp_http ]
    metrics:
      receivers: [ otlp ]
      exporters: [ debug, otlp_http ]
